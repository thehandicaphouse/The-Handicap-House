<script>
let productos=[];

fetch("productos.csv")
.then(res=>res.text())
.then(data=>{
const filas=data.split("\n");
productos=filas.slice(1).map(f=>{
const c=f.split(",");
return {id:c[0],nombre:c[1],precio:c[2],categoria:c[3],liga:c[4],equipo:c[5],imagen:c[6]};
});
});

document.addEventListener("input",e=>{
if(e.target.id==="buscador"){
const v=e.target.value.toLowerCase();
const r=document.getElementById("resultados");
r.innerHTML="";
if(v.length<2)return;

productos.filter(p=>p.nombre.toLowerCase().includes(v)||p.equipo.toLowerCase().includes(v)||p.liga.toLowerCase().includes(v))
.slice(0,6)
.forEach(p=>{
r.innerHTML+=`<div style="padding:8px;border-bottom:1px solid #333;cursor:pointer" onclick="window.location.href='monterrey.html'">${p.nombre}</div>`;
});
}
});
</script>
