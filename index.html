<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Handicap House</title>

<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700;900&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("fondo.png") center center fixed;
background-size:cover;
color:white;
}

/* BARRA SUPERIOR */

.header-top{
background:#1a0826;
text-align:center;
padding:10px;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
}

/* HEADER */

header{
background:#2b0c3f;
display:flex;
align-items:center;
justify-content:space-between;
padding:20px 40px;
position:relative;
}

/* LOGO */

.logo img{
height:110px;
}

/* TEXTO CENTRAL */

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:32px;
letter-spacing:2px;
text-transform:lowercase;
position:absolute;
left:50%;
transform:translateX(-50%);
text-align:center;
}

/* BUSCADOR */

.search input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
padding:20px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* TITULO */

.section-title{
text-align:center;
font-size:28px;
margin:40px 0;
}

/* DEPORTES */

.deportes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:30px;
padding:40px;
}

.deporte{
background:rgba(255,255,255,0.95);
color:black;
border-radius:12px;
padding:30px;
text-align:center;
box-shadow:0 0 10px rgba(0,0,0,0.3);
transition:0.3s;
}

.deporte:hover{
transform:scale(1.05);
}

.deporte img{
width:120px;
margin-top:15px;
}

/* FOOTER */

footer{
background:transparent;
text-align:center;
padding:30px;
margin-top:40px;
}

.social{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:15px;
}

.social a{
display:flex;
align-items:center;
gap:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

.social img{
width:22px;
}

/* RESPONSIVE */

@media (max-width:768px){

header{
flex-direction:column;
padding:20px;
gap:10px;
}

.logo img{
height:130px;
}

.header-center{
position:static;
transform:none;
font-size:24px;
margin:10px 0;
}

.search input{
width:100%;
max-width:300px;
}

}

</style>

</head>

<body>

<div class="header-top">
ENVIOS A TODO MEXICO ✈ | CALIDAD PREMIUM ⭐ | VARIEDAD TOTAL 👕

</section>
