<style>

body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
background:url("fondo.png") center center fixed;
background-size:cover;
color:white;
}

/* BARRA SUPERIOR */

.header-top{
background:#1a0826;
text-align:center;
padding:10px;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
}

/* HEADER */

header{
background:#2b0c3f;
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:20px 40px;
}

/* LOGO */

.logo{
justify-self:start;
}

.logo img{
height:110px;
}

/* TEXTO CENTRAL */

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:32px;
letter-spacing:2px;
text-transform:lowercase;
text-align:center;
}

/* BUSCADOR */

.search{
justify-self:end;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:12px;
padding:20px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* BOTONES DEPORTES */

.deportes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:30px;
padding:40px;
}

.deporte{
height:170px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:32px;
font-weight:bold;
color:white;
text-decoration:none;
background-size:cover;
background-position:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
position:relative;
overflow:hidden;
transition:0.3s;
}

.deporte::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

.deporte span{
position:relative;
z-index:2;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0px 3px 6px rgba(0,0,0,0.8);

}

.deporte:hover{
transform:scale(1.05);
}

/* FOOTER */

footer{
background:transparent;
text-align:center;
padding:30px;
margin-top:40px;
}

.social{
display:flex;
justify-content:center;
gap:25px;
flex-wrap:wrap;
margin-bottom:15px;
}

.social a{
display:flex;
align-items:center;
gap:8px;
color:white;
text-decoration:none;
font-weight:bold;
}

.social img{
width:22px;
}

/* RESPONSIVE */

@media (max-width:768px){

header{
grid-template-columns:1fr;
text-align:center;
gap:15px;
}

.logo{
justify-self:center;
}

.search{
justify-self:center;
}

.logo img{
height:120px;
}

.header-center{
font-size:24px;
}

.search input{
width:100%;
max-width:300px;
}

}

</style>

</head>
