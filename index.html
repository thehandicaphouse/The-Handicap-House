<style>

/* FONDO */

.fondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("fondo.png");
background-position:center;
background-size:cover;
background-repeat:no-repeat;
z-index:-1;
}

/* BASE */

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

/* BARRA SUPERIOR */

.header-top{
background:#1a0826;
text-align:center;
padding:8px;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
}

/* HEADER */

header{
background:#2b0c3f;
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:15px 40px;
}

.logo{
justify-self:start;
}

.logo img{
height:100px;
}

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:30px;
letter-spacing:2px;
text-transform:lowercase;
text-align:center;
}

.search{
justify-self:end;
}

.search input{
padding:8px;
width:230px;
border:none;
border-radius:6px;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
gap:12px;
padding:15px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:8px 16px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* CONTENIDO PRINCIPAL */

main{
max-width:1200px;
margin:auto;
}

/* DEPORTES */

.deportes{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:25px;
padding:20px;
}

.deporte{
height:160px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:30px;
font-weight:bold;
color:white;
text-decoration:none;
background-size:cover;
background-position:center;
box-shadow:0 0 10px rgba(0,0,0,0.4);
position:relative;
overflow:hidden;
transition:0.3s;
}

.deporte::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

.deporte span{
position:relative;
z-index:2;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0px 3px 6px rgba(0,0,0,0.8);
}

.deporte:hover{
transform:scale(1.05);
}

/* REDES FLOTANTES */

.redes-flotantes{
position:fixed;
bottom:60px;
left:50%;
transform:translateX(-50%);
display:flex;
gap:20px;
z-index:999;
}

.redes-flotantes a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
transition:0.3s;
}

.redes-flotantes img{
width:26px;
height:26px;
object-fit:contain;
}

.redes-flotantes a:hover{
transform:scale(1.15);
}

.whatsapp{
background:#25D366;
}

.instagram{
background:#E4405F;
}

.facebook{
background:#1877F2;
}

/* FOOTER */

footer{
text-align:center;
padding:20px;
font-size:14px;
}

/* RESPONSIVE */

@media (max-width:768px){

header{
grid-template-columns:1fr;
text-align:center;
gap:12px;
}

.logo{
justify-self:center;
}

.search{
justify-self:center;
}

.logo img{
height:90px;
}

.header-center{
font-size:22px;
}

.search input{
width:100%;
max-width:260px;
}

.deportes{
padding:15px;
gap:18px;
}

.deporte{
height:140px;
font-size:24px;
}

}

</style>

</head>
