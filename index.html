<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Handicap House</title>

<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700;900&display=swap" rel="stylesheet">

<style>

/* ========================= */
/* BASE */
/* ========================= */

html,body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* ========================= */
/* FONDO */
/* ========================= */

.fondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("fondo.png");
background-position:center;
background-size:cover;
background-repeat:no-repeat;
z-index:-1;
}

/* ========================= */
/* CINTA SUPERIOR */
/* ========================= */

.top-bar{
background:#1a0826;
overflow:hidden;
width:100%;
}

.ticker{
display:flex;
width:max-content;
animation:tickerMove 25s linear infinite;
}

.ticker span{
padding-right:120px;
font-weight:bold;
font-size:14px;
letter-spacing:1px;
}

/* ANIMACION PC */

@keyframes tickerMove{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* ========================= */
/* HEADER */
/* ========================= */

header{
background:#2b0c3f;
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:20px 40px;
}

.logo{
justify-self:start;
}

.logo img{
height:150px;
}

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:32px;
letter-spacing:2px;
text-transform:lowercase;
text-align:center;
}

.search{
justify-self:end;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* ========================= */
/* MENU */
/* ========================= */

.menu{
display:flex;
justify-content:center;
gap:12px;
padding:20px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* ========================= */
/* CONTENIDO */
/* ========================= */

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

.deportes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
width:90%;
max-width:1400px;
}

/* ========================= */
/* RECUADROS */
/* ========================= */

.deporte{
height:220px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
color:white;
text-decoration:none;
background-size:cover;
background-position:center;
box-shadow:0 0 15px rgba(0,0,0,0.4);
position:relative;
overflow:hidden;
transition:all .25s ease;
}

/* HOVER RESTAURADO */

.deporte:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.35);
}

/* OSCURECER FONDO */

.deporte::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

/* TEXTO */

.deporte span{
position:relative;
z-index:2;

/* CONTORNO NEGRO RESTAURADO */

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0 0 6px rgba(0,0,0,0.8);
}

/* ========================= */
/* REDES */
/* ========================= */

.redes{
display:flex;
justify-content:center;
gap:25px;
margin-top:40px;
}

/* BOTONES */

.redes a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
transition:.25s;
}

/* EFECTO HOVER */

.redes a:hover{
transform:scale(1.1);
}

/* COLORES */

.whatsapp{
background:#25D366;
}

.instagram{
background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);
}

.facebook{
background:#1877F2;
}

.redes img{
width:26px;
height:26px;
}

/* ========================= */
/* FOOTER */
/* ========================= */

footer{
text-align:center;
padding:20px;
font-size:14px;
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media (max-width:1100px){

.deportes{
grid-template-columns:repeat(2,1fr);
}

}

/* ========================= */
/* MOVIL */
/* ========================= */

@media (max-width:768px){

.ticker{
animation:tickerMobile 18s linear infinite;
}

.ticker span{
font-size:9px;
padding-right:80px;
}

@keyframes tickerMobile{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

header{
grid-template-columns:1fr;
text-align:center;
gap:12px;
padding:18px 20px;
}

.logo{
justify-self:center;
}

.logo img{
height:120px;
}

.header-center{
font-size:24px;
}

.search{
justify-self:center;
}

.search input{
width:100%;
max-width:260px;
}

.deportes{
grid-template-columns:1fr;
gap:20px;
padding-top:30px;
}

.deporte{
height:170px;
font-size:28px;
}

}

</style>

</head>

<body>

<div id="layout"></div>

<script>
fetch("layout.html")
.then(res => res.text())
.then(data => {
document.getElementById("layout").innerHTML = data;
});
</script>


<div class="fondo"></div>

<!-- CINTA SUPERIOR -->







<main>

<section class="deportes">

<a href="futbol.html" class="deporte" style="background-image:url('futbol.png')">
<span>FUTBOL</span>
</a>

<a href="nfl.html" class="deporte" style="background-image:url('nfl.png')">
<span>NFL</span>
</a>

<a href="mlb.html" class="deporte" style="background-image:url('mlb.png')">
<span>MLB</span>
</a>

<a href="nhl.html" class="deporte" style="background-image:url('nhl.png')">
<span>NHL</span>
</a>

</section>

</main>





</body>
</html>
