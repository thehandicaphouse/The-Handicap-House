<!DOCTYPE html>

<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Handicap House</title>

<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700;900&display=swap" rel="stylesheet">

<style>

/* FONDO */

.fondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("fondo.png");
background-position:center;
background-size:cover;
background-repeat:no-repeat;
z-index:-1;
}

/* BASE */

html,body{
margin:0;
height:100%;
font-family:Arial, Helvetica, sans-serif;
color:white;
}

body{
display:flex;
flex-direction:column;
min-height:100vh;
}

/* CINTA SUPERIOR */

.header-top{
background:#1a0826;
text-align:center;
padding:8px;
font-size:14px;
font-weight:bold;
letter-spacing:1px;
white-space:nowrap;
}

/* HEADER */

header{
background:#2b0c3f;
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:20px 40px;
}

.logo{
justify-self:start;
}

.logo img{
height:150px;
}

/* TEXTO CENTRAL */

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:32px;
letter-spacing:2px;
text-transform:lowercase;
text-align:center;
}

/* BUSCADOR */

.search{
justify-self:end;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
gap:12px;
padding:20px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* CONTENIDO */

main{
flex:1;
display:flex;
align-items:center;
justify-content:center;
}

/* DEPORTES */

.deportes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
width:90%;
max-width:1400px;
}

.deporte{
height:220px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
color:white;
text-decoration:none;
background-size:cover;
background-position:center;
box-shadow:0 0 15px rgba(0,0,0,0.4);
position:relative;
overflow:hidden;
transition:0.3s;
}

.deporte::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

.deporte span{
position:relative;
z-index:2;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0px 3px 6px rgba(0,0,0,0.8);
}

.deporte:hover{
transform:scale(1.05);
}

/* REDES */

.redes{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.redes a{
width:55px;
height:55px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.4);
transition:0.3s;
}

.redes img{
width:26px;
height:26px;
}

.redes a:hover{
transform:scale(1.1);
}

.whatsapp{background:#25D366;}
.instagram{background:#E4405F;}
.facebook{background:#1877F2;}

/* FOOTER */

footer{
text-align:center;
padding:20px;
font-size:14px;
}

/* RESPONSIVE */

@media (max-width:1100px){

.deportes{
grid-template-columns:repeat(2,1fr);
}

}

/* MOVIL */

@media (max-width:768px){

/* CINTA SUPERIOR AJUSTADA */

.header-top{
font-size:10px;
letter-spacing:0.5px;
padding:6px 4px;
}

/* HEADER */

header{
grid-template-columns:1fr;
text-align:center;
gap:15px;
}

.logo{
justify-self:center;
}

.search{
justify-self:center;
}

.logo img{
height:120px;
}

.header-center{
font-size:24px;
}

.search input{
width:100%;
max-width:260px;
}

main{
align-items:flex-start;
}

.deportes{
grid-template-columns:1fr;
gap:20px;
padding-top:30px;
}

.deporte{
height:170px;
font-size:28px;
}

}

</style>

</head>

<body>

<a href="mlb.html" class="deporte" style="background-image:url('mlb.png')">

<footer>

</body>

</html>
