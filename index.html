<!DOCTYPE html>

<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>The Handicap House</title>

<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700;900&display=swap" rel="stylesheet">

<style>

/* BASE */

html,body{
margin:0;
font-family:Arial, Helvetica, sans-serif;
color:white;
overflow-x:hidden;
}

/* FONDO */

.fondo{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background-image:url("fondo.png");
background-position:center;
background-size:cover;
z-index:-2;
}

/* CINTA */

.top-bar{
background:#1a0826;
overflow:hidden;
width:100%;
}

.ticker{
display:flex;
width:max-content;
animation:tickerMove 25s linear infinite;
}

.ticker span{
padding-right:120px;
font-weight:bold;
font-size:14px;
}

@keyframes tickerMove{
0%{transform:translateX(0);}
100%{transform:translateX(-50%);}
}

/* HEADER */

header{
background:#2b0c3f;
display:grid;
grid-template-columns:1fr 1fr 1fr;
align-items:center;
padding:20px 40px;
}

.logo{
justify-self:start;
}

.logo img{
height:150px;
}

.header-center{
font-family:'Antonio', sans-serif;
font-weight:900;
font-size:32px;
text-align:center;
}

.search{
justify-self:end;
}

.search input{
padding:10px;
width:250px;
border:none;
border-radius:6px;
}

/* MENU */

.menu{
display:flex;
justify-content:center;
gap:12px;
padding:20px;
}

.menu a{
background:#ff8c2a;
color:white;
padding:10px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.menu a:hover{
background:#ffb347;
transform:scale(1.05);
}

/* CONTENIDO */

main{
display:flex;
justify-content:center;
align-items:center;
margin-top:40px;
}

/* GRID DEPORTES */

.deportes{
display:grid;
grid-template-columns:repeat(4,1fr);
gap:40px;
width:90%;
max-width:1400px;
}

/* BOTONES DEPORTES */

.deporte{
height:220px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:36px;
font-weight:bold;
text-decoration:none;
color:white;
background-size:cover;
background-position:center;
position:relative;
overflow:hidden;
transition:.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);
}

.deporte:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(255,255,255,0.3);
}

.deporte::before{
content:"";
position:absolute;
width:100%;
height:100%;
background:rgba(0,0,0,0.25);
}

/* TEXTO */

.deporte span{
position:relative;
z-index:2;

text-shadow:
-2px -2px 0 #000,
2px -2px 0 #000,
-2px 2px 0 #000,
2px 2px 0 #000,
0 0 6px rgba(0,0,0,0.8);
}

/* FOOTER */

footer{
text-align:center;
padding:30px;
margin-top:60px;
}

/* RESPONSIVE */

@media (max-width:1000px){

.deportes{
grid-template-columns:repeat(2,1fr);
}

}

@media (max-width:768px){

header{
grid-template-columns:1fr;
text-align:center;
gap:12px;
}

.logo{
justify-self:center;
}

.logo img{
height:120px;
}

.header-center{
font-size:24px;
}

.search{
justify-self:center;
}

.search input{
width:100%;
max-width:260px;
}

.deportes{
grid-template-columns:1fr;
gap:20px;
}

.deporte{
height:170px;
font-size:28px;
}

}

</style>

</head>

<body>

</div>
</div>
