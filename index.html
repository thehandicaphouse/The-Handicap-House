<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Handicap House</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Antonio:wght@700;900&display=swap" rel="stylesheet">

<style>
html,body{margin:0;font-family:Arial, Helvetica, sans-serif;color:white;}
body{display:flex;flex-direction:column;min-height:100vh;}
.fondo{position:fixed;top:0;left:0;width:100%;height:100%;background-image:url("fondo.png");background-position:center;background-size:cover;background-repeat:no-repeat;z-index:-1;}
</style>
</head>

<body>

<div class="fondo"></div>

<div id="layout"></div>

<script>
fetch("layout.html")
.then(res => res.text())
.then(data => {

const container = document.getElementById("layout");
container.innerHTML = data;

const scripts = container.querySelectorAll("script");

scripts.forEach(oldScript => {
const newScript = document.createElement("script");

if(oldScript.src){
  newScript.src = oldScript.src;
} else {
  newScript.textContent = oldScript.textContent;
}

document.body.appendChild(newScript);
});

document.getElementById("contenido").innerHTML = `<main>

<section class="deportes">

<a href="futbol.html" class="deporte" style="background-image:url('futbol.png')">
<span>FUTBOL</span>
</a>

<a href="nfl.html" class="deporte" style="background-image:url('nfl.png')">
<span>NFL</span>
</a>

<a href="mlb.html" class="deporte" style="background-image:url('mlb.png')">
<span>MLB</span>
</a>

<a href="nhl.html" class="deporte" style="background-image:url('nhl.png')">
<span>NHL</span>
</a>

</section>

</main>`;

});
</script>

</body>
</html>
